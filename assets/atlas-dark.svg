    <rect x="140" y="218" width="148" height="32" rx="10" fill="#8985FF" fill-opacity="0.16" stroke="#8985FF" stroke-width="1.2"/>
    <text x="214" y="238" text-anchor="middle" font-size="11.5" font-weight="600" fill="#B7B4FF">handshake.initialize</text>

    <rect x="300" y="218" width="160" height="32" rx="10" fill="#8985FF" fill-opacity="0.16" stroke="#8985FF" stroke-width="1.2"/>
    <text x="380" y="238" text-anchor="middle" font-size="11.5" font-weight="600" fill="#B7B4FF">tools.list / tools.call</text>

    <rect x="140" y="258" width="320" height="32" rx="10" fill="#8985FF" fill-opacity="0.16" stroke="#8985FF" stroke-width="1.2"/>
    <text x="300" y="278" text-anchor="middle" font-size="11.5" font-weight="600" fill="#B7B4FF">oauth · discovery + WWW-Authenticate（Zero-Touch）</text>
