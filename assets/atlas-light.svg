<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 380" width="880" height="380"
     font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
     role="img" aria-label="架构：CLI → runner → stdio 启动目标 MCP server → spec 校验 × client 适配器 → 一致性矩阵 + 徽章">
  <defs>
    <marker id="ah-l" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#B9B9C2"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="880" height="380" fill="#F5F5F7"/>

  <!-- connectors -->
  <g stroke="#C9C9D0" stroke-width="1.5" fill="none">
    <line x1="150" y1="78" x2="230" y2="78" marker-end="url(#ah-l)"/>
    <line x1="380" y1="78" x2="455" y2="78" marker-end="url(#ah-l)"/>
    <!-- runner down to spec block -->
    <line x1="300" y1="108" x2="300" y2="180" marker-end="url(#ah-l)"/>
    <!-- spec checks across adapters -->
    <line x1="430" y1="240" x2="610" y2="240" marker-end="url(#ah-l)"/>
    <!-- adapters down to matrix -->
    <line x1="690" y1="300" x2="690" y2="324" marker-end="url(#ah-l)"/>
  </g>

  <!-- top row: CLI -> runner -> target server -->
  <g>
    <rect x="40" y="52" width="110" height="52" rx="14" fill="#0071E3" fill-opacity="0.10" stroke="#0071E3" stroke-width="1.5"/>
    <text x="95" y="76" text-anchor="middle" font-size="13.5" font-weight="600" fill="#0A4F9E">CLI</text>
    <text x="95" y="93" text-anchor="middle" font-size="10.5" font-weight="500" fill="#6E6E73">run · --json · --badge</text>

    <rect x="232" y="52" width="148" height="52" rx="14" fill="#0071E3" fill-opacity="0.10" stroke="#0071E3" stroke-width="1.5"/>
    <text x="306" y="76" text-anchor="middle" font-size="13.5" font-weight="600" fill="#0A4F9E">runner</text>
    <text x="306" y="93" text-anchor="middle" font-size="10.5" font-weight="500" fill="#6E6E73">orchestrate + collect</text>

    <rect x="455" y="52" width="170" height="52" rx="14" fill="#3B5B82" fill-opacity="0.12" stroke="#3B5B82" stroke-width="1.5"/>
    <text x="540" y="74" text-anchor="middle" font-size="13" font-weight="600" fill="#2C4763">target MCP server</text>
    <text x="540" y="91" text-anchor="middle" font-size="10.5" font-weight="500" fill="#6E6E73">spawned over stdio</text>
  </g>

  <!-- spec checks block -->
  <g>
    <rect x="120" y="180" width="360" height="120" rx="16" fill="#5E5CE6" fill-opacity="0.07" stroke="#5E5CE6" stroke-width="1.5"/>
    <text x="140" y="204" font-size="12.5" font-weight="700" fill="#4B3FC4">spec · 校验集</text>

    <rect x="140" y="218" width="148" height="32" rx="10" fill="#5E5CE6" fill-opacity="0.12" stroke="#5E5CE6" stroke-width="1.2"/>
    <text x="214" y="238" text-anchor="middle" font-size="11.5" font-weight="600" fill="#4B3FC4">handshake.initialize</text>

    <rect x="300" y="218" width="160" height="32" rx="10" fill="#5E5CE6" fill-opacity="0.12" stroke="#5E5CE6" stroke-width="1.2"/>
    <text x="380" y="238" text-anchor="middle" font-size="11.5" font-weight="600" fill="#4B3FC4">tools.list / tools.call</text>

    <rect x="140" y="258" width="320" height="32" rx="10" fill="#5E5CE6" fill-opacity="0.12" stroke="#5E5CE6" stroke-width="1.2"/>
    <text x="300" y="278" text-anchor="middle" font-size="11.5" font-weight="600" fill="#4B3FC4">oauth · discovery + WWW-Authenticate（Zero-Touch）</text>
  </g>

  <!-- adapters column -->
  <g>
    <rect x="610" y="180" width="230" height="120" rx="16" fill="#0071E3" fill-opacity="0.07" stroke="#0071E3" stroke-width="1.5"/>
    <text x="630" y="204" font-size="12.5" font-weight="700" fill="#0A4F9E">client 适配器</text>

    <rect x="630" y="216" width="190" height="24" rx="8" fill="#10A37F" fill-opacity="0.12" stroke="#10A37F" stroke-width="1.2"/>
    <text x="640" y="232" font-size="11" font-weight="600" fill="#0B6B53">Claude Code · 实装 ✓</text>

    <rect x="630" y="244" width="92" height="24" rx="8" fill="#C9C9D0" fill-opacity="0.30" stroke="#C9C9D0" stroke-width="1.2"/>
    <text x="640" y="260" font-size="11" font-weight="600" fill="#6E6E73">Cursor · n/a</text>

    <rect x="728" y="244" width="92" height="24" rx="8" fill="#C9C9D0" fill-opacity="0.30" stroke="#C9C9D0" stroke-width="1.2"/>
    <text x="738" y="260" font-size="11" font-weight="600" fill="#6E6E73">Gemini · n/a</text>

    <text x="630" y="288" font-size="10.5" font-weight="500" fill="#6E6E73">stub 返回 n/a，v0.2 接真适配器</text>
  </g>

  <!-- output row: matrix + badge -->
  <g>
    <rect x="120" y="324" width="640" height="44" rx="14" fill="#10A37F" fill-opacity="0.10" stroke="#10A37F" stroke-width="1.5"/>
    <text x="148" y="351" font-size="13" font-weight="700" fill="#0B6B53">conformance matrix</text>
    <text x="320" y="351" font-size="11.5" font-weight="500" fill="#6E6E73">client × {behavior, auth} · 终端彩色表 + report.json</text>
    <rect x="612" y="334" width="130" height="24" rx="8" fill="#10A37F" fill-opacity="0.16" stroke="#10A37F" stroke-width="1.2"/>
    <text x="677" y="350" text-anchor="middle" font-size="11" font-weight="600" fill="#0B6B53">badge.svg / .json</text>
  </g>
</svg>
