name: release
on:
  push:
    tags: ['v*.*.*']

permissions:
  contents: write

jobs:
  pack:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm test

      # npm pack the tarball into dist/ and emit sha256 checksums.
      - name: Pack tarball + checksums
        run: |
          mkdir -p dist
          npm pack --pack-destination dist
          ( cd dist && sha256sum *.tgz > checksums.txt )
          ls -l dist

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: npm-package
          path: dist/*

  publish:
    needs: pack
    runs-on: ubuntu-latest
    # Optional: only runs when an NPM_TOKEN secret is configured.
    if: ${{ github.repository_owner == 'SuperMarioYL' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Publish to npm (skipped if no token)
        run: |
          if [ -z "${NODE_AUTH_TOKEN}" ]; then
            echo "NPM_TOKEN not set — skipping npm publish."
            exit 0
          fi
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
