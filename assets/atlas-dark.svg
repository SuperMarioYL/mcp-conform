    <text x="630" y="204" font-size="12.5" font-weight="700" fill="#9DCBFF">client 适配器</text>

    <rect x="630" y="216" width="190" height="24" rx="8" fill="#2DC79A" fill-opacity="0.16" stroke="#2DC79A" stroke-width="1.2"/>
    <text x="640" y="232" font-size="11" font-weight="600" fill="#6FE0BE">Claude Code · 实装 ✓</text>

    <rect x="630" y="244" width="92" height="24" rx="8" fill="#3A3A44" fill-opacity="0.60" stroke="#3A3A44" stroke-width="1.2"/>
    <text x="640" y="260" font-size="11" font-weight="600" fill="#A1A1A8">Cursor · n/a</text>

    <rect x="728" y="244" width="92" height="24" rx="8" fill="#3A3A44" fill-opacity="0.60" stroke="#3A3A44" stroke-width="1.2"/>
    <text x="738" y="260" font-size="11" font-weight="600" fill="#A1A1A8">Gemini · n/a</text>

    <text x="630" y="288" font-size="10.5" font-weight="500" fill="#A1A1A8">stub 返回 n/a，v0.2 接真适配器</text>
  </g>

  <g>
    <rect x="120" y="324" width="640" height="44" rx="14" fill="#2DC79A" fill-opacity="0.14" stroke="#2DC79A" stroke-width="1.5"/>
    <text x="148" y="351" font-size="13" font-weight="700" fill="#6FE0BE">conformance matrix</text>
    <text x="320" y="351" font-size="11.5" font-weight="500" fill="#A1A1A8">client × {behavior, auth} · 终端彩色表 + report.json</text>
    <rect x="612" y="334" width="130" height="24" rx="8" fill="#2DC79A" fill-opacity="0.18" stroke="#2DC79A" stroke-width="1.2"/>
    <text x="677" y="350" text-anchor="middle" font-size="11" font-weight="600" fill="#6FE0BE">badge.svg / .json</text>
