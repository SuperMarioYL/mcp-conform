name: demo
on: { workflow_dispatch: {}, push: { tags: ['v*.*.*'] } }
permissions: { contents: write }
jobs:
  vhs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci && npm run build
      # vhs-action's self-install of ffmpeg is flaky on GH runners — pre-install it.
      - run: sudo apt-get update && sudo apt-get install -y ffmpeg ttyd
      - uses: charmbracelet/vhs-action@v2
        with: { path: docs/demo.tape, install-fonts: true }   # writes assets/demo.gif per the tape's Output line
      - run: |
          git config user.name  "${{ github.actor }}"
          git config user.email "${{ github.actor }}@users.noreply.github.com"
          git add assets/demo.gif
          git commit -m "chore: render demo gif" || { echo "no change"; exit 0; }
          git push origin HEAD:main   # HEAD:main works on tag-triggered (detached HEAD) runs too
