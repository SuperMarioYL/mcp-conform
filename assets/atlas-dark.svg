<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 380" width="880" height="380"
     font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
     role="img" aria-label="架构：CLI → runner → stdio 启动目标 MCP server → spec 校验 × client 适配器 → 一致性矩阵 + 徽章">
  <defs>
    <marker id="ah-d" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#5A5A66"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="880" height="380" fill="#1D1D1F"/>

  <g stroke="#3A3A44" stroke-width="1.5" fill="none">
    <line x1="150" y1="78" x2="230" y2="78" marker-end="url(#ah-d)"/>
    <line x1="380" y1="78" x2="455" y2="78" marker-end="url(#ah-d)"/>
    <line x1="300" y1="108" x2="300" y2="180" marker-end="url(#ah-d)"/>
    <line x1="430" y1="240" x2="610" y2="240" marker-end="url(#ah-d)"/>
    <line x1="690" y1="300" x2="690" y2="324" marker-end="url(#ah-d)"/>
  </g>

  <g>
    <rect x="40" y="52" width="110" height="52" rx="14" fill="#4DA3FF" fill-opacity="0.16" stroke="#4DA3FF" stroke-width="1.5"/>
    <text x="95" y="76" text-anchor="middle" font-size="13.5" font-weight="600" fill="#9DCBFF">CLI</text>
    <text x="95" y="93" text-anchor="middle" font-size="10.5" font-weight="500" fill="#A1A1A8">run · --json · --badge</text>

    <rect x="232" y="52" width="148" height="52" rx="14" fill="#4DA3FF" fill-opacity="0.16" stroke="#4DA3FF" stroke-width="1.5"/>
    <text x="306" y="76" text-anchor="middle" font-size="13.5" font-weight="600" fill="#9DCBFF">runner</text>
    <text x="306" y="93" text-anchor="middle" font-size="10.5" font-weight="500" fill="#A1A1A8">orchestrate + collect</text>

    <rect x="455" y="52" width="170" height="52" rx="14" fill="#7E9CC0" fill-opacity="0.18" stroke="#7E9CC0" stroke-width="1.5"/>
    <text x="540" y="74" text-anchor="middle" font-size="13" font-weight="600" fill="#B8CDE6">target MCP server</text>
    <text x="540" y="91" text-anchor="middle" font-size="10.5" font-weight="500" fill="#A1A1A8">spawned over stdio</text>
  </g>

  <g>
