<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 300" width="880" height="300"
     font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif"
     role="img" aria-label="mcp-conform — 中立的跨客户端 MCP 一致性校验工具">
  <defs>
    <linearGradient id="hg-l" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0071E3"/>
      <stop offset="1" stop-color="#3B5B82"/>
    </linearGradient>
    <linearGradient id="hb-l" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F5F5F7"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="880" height="300" rx="0" fill="url(#hb-l)"/>
  <rect x="0" y="0" width="880" height="6" fill="url(#hg-l)"/>

  <!-- left: wordmark + tagline -->
  <text x="60" y="120" font-size="52" font-weight="700" fill="#1D1D1F" letter-spacing="-1">mcp-conform</text>
  <text x="62" y="160" font-size="19" font-weight="500" fill="#3B5B82">中立的跨客户端 MCP 一致性校验工具</text>
  <text x="62" y="190" font-size="14.5" font-weight="400" fill="#6E6E73">一条命令，输出每客户端的行为 + Zero-Touch OAuth 校验矩阵</text>

  <!-- pill badges -->
  <g font-size="12.5" font-weight="600">
    <rect x="62"  y="216" width="74"  height="26" rx="13" fill="#0071E3" fill-opacity="0.10" stroke="#0071E3" stroke-width="1.2"/>
    <text x="99"  y="233" text-anchor="middle" fill="#0A4F9E">MCP</text>
    <rect x="146" y="216" width="92"  height="26" rx="13" fill="#3B5B82" fill-opacity="0.12" stroke="#3B5B82" stroke-width="1.2"/>
    <text x="192" y="233" text-anchor="middle" fill="#2C4763">stdio · CLI</text>
    <rect x="248" y="216" width="120" height="26" rx="13" fill="#10A37F" fill-opacity="0.10" stroke="#10A37F" stroke-width="1.2"/>
    <text x="308" y="233" text-anchor="middle" fill="#0B6B53">parity matrix</text>
  </g>

  <!-- right: mini matrix glyph -->
  <g transform="translate(600,70)">
    <rect x="0" y="0" width="232" height="160" rx="16" fill="#FFFFFF" stroke="#C9C9D0" stroke-width="1.5"/>
    <text x="16" y="28" font-size="12" font-weight="600" fill="#6E6E73">client</text>
    <text x="128" y="28" font-size="12" font-weight="600" fill="#6E6E73">behavior</text>
    <text x="190" y="28" font-size="12" font-weight="600" fill="#6E6E73">auth</text>
    <line x1="16" y1="40" x2="216" y2="40" stroke="#C9C9D0" stroke-width="1"/>

    <text x="16" y="66" font-size="12.5" font-weight="600" fill="#1D1D1F">Claude Code</text>
    <circle cx="138" cy="62" r="7" fill="#10A37F"/>
    <text x="138" y="66" text-anchor="middle" font-size="10" font-weight="700" fill="#FFFFFF">✓</text>
    <circle cx="196" cy="62" r="7" fill="#E8A317"/>

    <text x="16" y="98" font-size="12.5" font-weight="600" fill="#6E6E73">Cursor</text>
    <circle cx="138" cy="94" r="7" fill="#C9C9D0"/>
    <circle cx="196" cy="94" r="7" fill="#C9C9D0"/>

    <text x="16" y="130" font-size="12.5" font-weight="600" fill="#6E6E73">Gemini</text>
    <circle cx="138" cy="126" r="7" fill="#C9C9D0"/>
    <circle cx="196" cy="126" r="7" fill="#C9C9D0"/>
  </g>
</svg>
